# ── Alembic Configuration ─────────────────────────────────────────────
# Este archivo configura el comportamiento de las migraciones de BD.

[alembic]
# Ruta a los scripts de migración
script_location = alembic

# Plantilla para nombres de archivo: {id_revision}_{descripcion_corta}.py
file_template = %%(rev)s_%%(slug)s

# Formato de fecha para los archivos y cabeceras
# timezone = UTC

# Separador de rutas (usa el del sistema operativo: : en Unix, ; en Windows)
version_path_separator = os

# Codificación de salida para los archivos generados
output_encoding = utf-8

# URL de conexión (Se sobreescribe en env.py con la del archivo .env)
sqlalchemy.url = postgresql://user:pass@localhost/stocker

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# lint with autoflake
# hooks = autoflake
# autoflake.type = exec
# autoflake.executable = autoflake
# autoflake.options = --in-place --remove-unused-variables --remove-all-unused-imports REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
