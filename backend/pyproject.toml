[tool.ruff]
# Configuración de Ruff (Linter y Formateador)
line-length = 100
target-version = "py313"

[tool.ruff.lint]
# Reglas seleccionadas:
# E: Error de estilo (Pycodestyle)
# F: Errores lógicos (Pyflakes)
# B: Errores comunes (Bugbear)
# I: Orden de imports (Isort)
# UP: Sugerencias de sintaxis moderna (Pyupgrade)
# S: Seguridad (Bandit)
select = ["E", "F", "B", "I", "UP", "S"]
ignore = [
    "B008", # Do not perform function call `Depends` in argument defaults (FastAPI pattern)
    "B904", # Within an `except` clause, raise exceptions with `raise ... from err`
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106", "S107"]
"app/core/config.py" = ["S105"]
"app/seed/*" = ["S105"]
"app/database.py" = ["S608"]
"app/models/token.py" = ["S105"]
"app/api/endpoints/auth.py" = ["S106"]


[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.mypy]
# Configuración de MyPy (Type Checking)
python_version = "3.13"
strict = false
ignore_missing_imports = true
check_untyped_defs = true
disallow_untyped_defs = false
disable_error_code = ["attr-defined", "assignment", "arg-type", "dict-item"]
plugins = ["pydantic.mypy"]



[tool.pytest.ini_options]
# Configuración de Pytest
testpaths = ["tests"]
pythonpath = ["."]
addopts = "--cov=app --cov-report=term-missing"
