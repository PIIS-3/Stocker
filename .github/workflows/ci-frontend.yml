# ci-frontend.yml — Integración Continua del Frontend (React / TypeScript / Vite)
#
# Se ejecuta en dos situaciones:
#   1. Al hacer push directo a la rama 'main'.
#   2. Al abrir, reabrir o actualizar un Pull Request (cualquier rama de origen).
#
# Flujo:
#   docker-build → (único job)
#   Construye la imagen Docker del frontend para detectar errores de compilación
#   o de configuración del Dockerfile antes de llegar a producción.

name: CI — Frontend

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  # ── JOB: Test ────────────────────────────────────────────────────────
  # Ejecuta pruebas unitarias para asegurar la calidad del código.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        # npm ci es preferible en CI porque es más rápido y garantiza que el lockfile no cambie
        working-directory: ./frontend
        run: npm ci

      - name: Ejecutar Pruebas (Vitest)
        # --run ejecuta las pruebas una sola vez en lugar de entrar en modo observación (watch)
        working-directory: ./frontend
        run: npm test -- --run

  # ── JOB: Build Docker ────────────────────────────────────────────────
  # Construye la imagen Docker del frontend (Vite + Nginx o similar).
  # Esto verifica que el Dockerfile y el proceso de build de React
  # son correctos end-to-end. No sube la imagen (push: false).
  docker-build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6.0.2

      - name: Configurar QEMU
        # QEMU permite emular otras arquitecturas de CPU (ej: ARM).
        uses: docker/setup-qemu-action@v3.2.0

      - name: Configurar Docker Buildx
        # Buildx es el motor de construcción moderno de Docker.
        uses: docker/setup-buildx-action@v3.6.1

      - name: Construir imagen Docker del frontend
        id: docker_build
        uses: docker/build-push-action@v6.7.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false   # Solo validar el build, no subir la imagen.
          tags: |
            piis3/stocker:${{ github.sha }}
