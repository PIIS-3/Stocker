# ci-frontend.yml — Integración Continua del Frontend (React / TypeScript / Vite)
#
# Se ejecuta en dos situaciones:
#   1. Al hacer push directo a la rama 'main'.
#   2. Al abrir, reabrir o actualizar un Pull Request (cualquier rama de origen).
#
# Flujo:
#   docker-build → (único job)
#   Construye la imagen Docker del frontend para detectar errores de compilación
#   o de configuración del Dockerfile antes de llegar a producción.

name: CI — Frontend

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  # ── JOB: Lint and Test ──────────────────────────────────────────────
  lint-and-test:
    name: Lint, Type-Check and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6.0.2

      - name: Configurar Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '22' # O la versión que prefieras para el runner
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps
        working-directory: ./frontend

      - name: Verificar formato (Prettier)
        run: npm run format:check
        working-directory: ./frontend

      - name: Ejecutar Lint (ESLint)
        run: npm run lint
        working-directory: ./frontend

      - name: Verificar Tipos (TypeScript)
        run: npm run type-check
        working-directory: ./frontend

      - name: Ejecutar Pruebas (Vitest)
        run: npm run test -- --run
        working-directory: ./frontend

  # ── JOB: Build Docker ────────────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6.0.2

      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3.2.0

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3.6.1

      - name: Construir imagen Docker del frontend
        id: docker_build
        uses: docker/build-push-action@v6.7.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: |
            piis3/stocker:${{ github.sha }}
